<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Writer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <div class="auth-container">
        <div class="auth-card glass-card fade-up">
            <div class="brand">AI Writer</div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to continue to your dashboard.</p>

            <div id="message" class="message hidden"></div>

            <form id="loginForm" class="auth-form">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                >

                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >

                <button type="submit" class="btn btn-primary btn-glow">Login</button>
            </form>

            <p class="switch-link">
                Don’t have an account?
                <a href="{{ url_for('register_page') }}">Register</a>
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
